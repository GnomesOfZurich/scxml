name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write      # OIDC token for Sigstore keyless signing
  attestations: write  # GitHub artifact attestations

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run the full CI suite before publishing.
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Verify tag exists on main
        run: |
          tag="${{ inputs.tag }}"
          if ! git tag --list "$tag" | grep -q .; then
            echo "Tag $tag does not exist. Create it on main first: git tag $tag && git push --tags"
            exit 1
          fi
          tag_commit=$(git rev-list -n 1 "$tag")
          if ! git merge-base --is-ancestor "$tag_commit" main; then
            echo "Tag $tag points to a commit not on main. Releases must be from main."
            exit 1
          fi

  ci:
    name: CI
    needs: preflight
    uses: ./.github/workflows/ci.yml

  publish-crate:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${{ inputs.tag }}"
          tag="${tag#v}"
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$tag" != "$version" ]; then
            echo "Tag v${tag} does not match Cargo.toml version ${version}"
            exit 1
          fi

      - name: Dry run
        run: cargo publish --dry-run

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm-core:
    name: Publish npm core package
    needs: publish-crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM package
        run: ./scripts/build-wasm-package.sh --scope gnomes

      - name: Publish core package to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          cd pkg && npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Signed release with SBOM ──────────────────────────────────────
  release:
    name: GitHub Release + SBOM
    needs: publish-npm-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --all --format json
          mv scxml.cdx.json sbom.cdx.json

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: sbom.cdx.json

